<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias | LactoScan</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0A58CA 0%, #042B66 100%);
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 40px;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        h1 {
            margin-bottom: 20px;
            font-size: 3rem;
            letter-spacing: -1px;
        }
        p {
            margin-bottom: 30px;
            color: rgba(255,255,255,0.86);
            font-size: 1.1rem;
            line-height: 1.7;
        }
        a {
            display: inline-block;
            background: #FFFFFF;
            color: #042B66;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 999px;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Gracias por suscribirte!</h1>
        <p>Tu registro fue recibido correctamente. Recibirás una confirmación por correo y pronto te contactaremos.</p>
        <a href="https://lucianoconstanzoa-gif.github.io/LactoScan/">Volver a LactoScan</a>
    </div>
</body>
</html>
